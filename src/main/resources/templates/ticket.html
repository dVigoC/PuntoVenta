<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comprobante</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            background: #fff;
            color: #000;
            padding: 10px;
        }

        .ticket {
            max-width: 300px;
            margin: 0 auto;
        }

        /* ── Header: logo left, title centered ── */
        .ticket-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .ticket-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            flex-shrink: 0;
            /* Forzar blanco y negro */
            filter: grayscale(100%) contrast(150%);
        }

        .ticket-logo-empty {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }

        .ticket-company {
            flex: 1;
            text-align: center;
        }

        .ticket-company h1 {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .ticket-company p {
            font-size: 9px;
            margin-top: 2px;
        }

        .dashed {
            border-top: 1px dashed #000;
            margin: 6px 0;
        }

        /* ── Date/time right-aligned ── */
        .ticket-meta {
            text-align: right;
            font-size: 9px;
            margin-bottom: 6px;
        }

        .ticket-meta strong { font-size: 10px; }

        /* ── Order info ── */
        .ticket-info {
            font-size: 10px;
            margin-bottom: 6px;
        }

        .ticket-info table { width: 100%; }
        .ticket-info td { padding: 1px 0; }
        .ticket-info td:last-child { text-align: right; }

        /* ── Items table ── */
        .items-header {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 4px;
            font-weight: bold;
            font-size: 9px;
            padding: 3px 0;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
        }

        .item-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 4px;
            padding: 2px 0;
            font-size: 10px;
        }

        .item-row .qty { text-align: center; min-width: 28px; }
        .item-row .price { text-align: right; min-width: 55px; }
        .item-row .name { word-break: break-word; }

        /* ── Totals ── */
        .totals {
            margin-top: 4px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 1px 0;
        }

        .total-row.grand {
            font-size: 13px;
            font-weight: bold;
            border-top: 1px solid #000;
            border-bottom: 1px double #000;
            padding: 3px 0;
            margin-top: 4px;
        }

        /* ── Footer ── */
        .ticket-footer {
            margin-top: 10px;
            text-align: center;
            font-size: 9px;
        }

        .ticket-footer .pie { margin-bottom: 4px; }
        .ticket-footer .dev { font-size: 8px; color: #333; }

        /* Print-specific */
        @media screen {
            .no-screen { display: none; }
            body { background: #f5f5f5; }
            .ticket {
                background: #fff;
                padding: 20px;
                box-shadow: 0 2px 8px rgba(0,0,0,.15);
                margin: 20px auto;
            }
            .btn-print {
                display: block;
                width: fit-content;
                margin: 0 auto 16px;
                padding: 8px 20px;
                background: #1d3557;
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }
        }

        @media print {
            .btn-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<button class="btn-print no-screen" onclick="window.print()">🖨 Imprimir</button>

<div class="ticket">

    <!-- ── Header: logo left + company centered ── -->
    <div class="ticket-header">
        <th:block th:if="${empresa != null and empresa.logoUrl != null and !empresa.logoUrl.isEmpty()}">
            <img class="ticket-logo"
                 th:src="${empresa.logoUrl}"
                 alt="Logo">
        </th:block>
        <div th:if="${empresa == null or empresa.logoUrl == null or empresa.logoUrl.isEmpty()}"
             class="ticket-logo-empty"></div>

        <div class="ticket-company">
            <h1 th:text="${empresa != null ? empresa.nombre : 'RESTAURANTE'}">RESTAURANTE</h1>
            <p th:text="${empresa != null and empresa.ruc != null ? 'RUC: ' + empresa.ruc : ''}"></p>
            <p th:text="${empresa != null ? empresa.direccion : ''}"></p>
            <p th:text="${empresa != null ? empresa.telefono : ''}"></p>
        </div>
    </div>

    <div class="dashed"></div>

    <!-- ── Tipo de comprobante ── -->
    <div style="text-align:center;font-weight:bold;font-size:12px;margin-bottom:4px;"
         th:text="${comprobante.tipo}">TICKET</div>

    <!-- ── Fecha/Hora alineada a la derecha ── -->
    <div class="ticket-meta">
        <strong th:text="${#temporals.format(comprobante.fechaEmision, 'dd/MM/yyyy')}">01/01/2025</strong>
        <span th:text="' ' + ${#temporals.format(comprobante.fechaEmision, 'HH:mm')}">12:00</span>
    </div>

    <!-- ── Info pedido ── -->
    <div class="ticket-info">
        <table>
            <tr>
                <td>Pedido:</td>
                <td th:text="${pedido.numeroPedido}">PED-20250101-0001</td>
            </tr>
            <tr>
                <td>Mesa:</td>
                <td th:text="${pedido.mesa.numero + ' (' + pedido.mesa.area.nombre + ')'}">01</td>
            </tr>
            <tr th:if="${comprobante.empleado != null}">
                <td>Atendido por:</td>
                <td th:text="${comprobante.empleado.nombres}">Cajero</td>
            </tr>
        </table>
    </div>

    <div class="dashed"></div>

    <!-- ── Items ── -->
    <div class="items-header">
        <span>DESCRIPCIÓN</span>
        <span style="text-align:center">CANT</span>
        <span style="text-align:right">IMPORTE</span>
    </div>

    <th:block th:each="item : ${detalles}">
        <div class="item-row">
            <span class="name" th:text="${item.producto.nombre}">Producto</span>
            <span class="qty"  th:text="${item.cantidad}">1</span>
            <span class="price"
                  th:text="${'S/ ' + #numbers.formatDecimal(item.subtotal, 1, 2)}">S/ 0.00</span>
        </div>
        <div th:if="${item.notaCocina != null and !item.notaCocina.isEmpty()}"
             style="font-size:9px;padding-left:4px;color:#444;"
             th:text="'  * ' + ${item.notaCocina}"></div>
    </th:block>

    <div class="dashed"></div>

    <!-- ── Totals ── -->
    <div class="totals">
        <div class="total-row">
            <span>Subtotal:</span>
            <span th:text="${'S/ ' + #numbers.formatDecimal(comprobante.subtotal, 1, 2)}">S/ 0.00</span>
        </div>
        <div class="total-row" th:if="${comprobante.descuento != null and comprobante.descuento > 0}">
            <span>Descuento:</span>
            <span th:text="${'-S/ ' + #numbers.formatDecimal(comprobante.descuento, 1, 2)}">-S/ 0.00</span>
        </div>
        <div class="total-row">
            <span th:text="${'IGV (' + (empresa != null ? empresa.porcentajeIgv : 18) + '%)'}">IGV (18%):</span>
            <span th:text="${'S/ ' + #numbers.formatDecimal(comprobante.igv, 1, 2)}">S/ 0.00</span>
        </div>
        <div class="total-row grand">
            <span>TOTAL:</span>
            <span th:text="${'S/ ' + #numbers.formatDecimal(comprobante.total, 1, 2)}">S/ 0.00</span>
        </div>
        <div class="total-row" th:if="${comprobante.montoPagado != null}">
            <span>Pagado:</span>
            <span th:text="${'S/ ' + #numbers.formatDecimal(comprobante.montoPagado, 1, 2)}">S/ 0.00</span>
        </div>
        <div class="total-row" th:if="${comprobante.vuelto != null and comprobante.vuelto > 0}">
            <span>Vuelto:</span>
            <span th:text="${'S/ ' + #numbers.formatDecimal(comprobante.vuelto, 1, 2)}">S/ 0.00</span>
        </div>
    </div>

    <div class="dashed"></div>

    <!-- ── Footer ── -->
    <div class="ticket-footer">
        <div class="pie" th:text="${empresa != null ? empresa.pieFactura : 'Gracias por su visita'}">
            Gracias por su visita
        </div>
        <div class="dev" th:text="${empresa != null ? empresa.desarrollador : ''}"></div>
    </div>

</div>

<script th:inline="javascript">
    // Auto-print if ?autoPrint=true
    const params = new URLSearchParams(window.location.search);
    if (params.get('autoPrint') === 'true') {
        window.onload = () => window.print();
    }
</script>
</body>
</html>

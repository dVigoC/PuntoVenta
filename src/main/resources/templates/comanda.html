<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comanda Cocina</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            background: #fff;
            color: #000;
            padding: 10px;
        }

        .comanda { max-width: 280px; margin: 0 auto; }

        .com-header {
            text-align: center;
            margin-bottom: 6px;
        }

        .com-header h1 {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .com-header .num-comanda {
            font-size: 22px;
            font-weight: bold;
            margin: 4px 0;
        }

        .dashed { border-top: 1px dashed #000; margin: 5px 0; }
        .solid  { border-top: 1px solid  #000; margin: 5px 0; }

        .com-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .com-mesa {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 4px 0;
        }

        .item-row {
            display: flex;
            gap: 6px;
            padding: 3px 0;
            font-size: 13px;
            border-bottom: 1px dotted #ccc;
        }

        .item-row:last-child { border-bottom: none; }

        .item-qty {
            font-weight: bold;
            min-width: 28px;
            font-size: 15px;
        }

        .item-name { flex: 1; }
        .item-nota { font-size: 10px; color: #444; padding-left: 34px; font-style: italic; }

        .envio-badge {
            text-align: center;
            font-size: 10px;
            background: #000;
            color: #fff;
            padding: 2px 8px;
            display: inline-block;
            margin-bottom: 4px;
        }

        @media screen {
            body { background: #f5f5f5; }
            .comanda { background: #fff; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.15); margin: 20px auto; }
            .btn-print {
                display: block; width: fit-content; margin: 0 auto 16px;
                padding: 8px 20px; background: #1d3557; color: #fff;
                border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
            }
        }

        @media print {
            .btn-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<button class="btn-print" onclick="window.print()">🖨 Imprimir comanda</button>

<div class="comanda">

    <div class="com-header">
        <h1>⚑ COCINA</h1>
        <div class="num-comanda" th:text="${comanda.numeroComanda}">COM-20250101-0001</div>
        <div class="envio-badge"
             th:text="${'ENVÍO N° ' + comanda.nroEnvio}">ENVÍO N° 1</div>
    </div>

    <div class="dashed"></div>

    <!-- Mesa destacada -->
    <div class="com-mesa"
         th:text="${'MESA: ' + pedido.mesa.numero + '  (' + pedido.mesa.area.nombre + ')'}">MESA: 01</div>

    <div class="com-meta">
        <span>Pedido: <strong th:text="${pedido.numeroPedido}">PED-…</strong></span>
        <span th:text="${#temporals.format(comanda.creadoEn, 'HH:mm dd/MM')}">12:00</span>
    </div>

    <div class="solid"></div>

    <!-- Items -->
    <th:block th:each="item : ${items}">
        <div class="item-row">
            <span class="item-qty" th:text="${item.cantidad + 'x'}">1x</span>
            <span class="item-name" th:text="${item.detallePedido.producto.nombre}">Producto</span>
        </div>
        <div class="item-nota"
             th:if="${item.notaCocina != null and !item.notaCocina.isEmpty()}"
             th:text="'↳ ' + ${item.notaCocina}"></div>
    </th:block>

    <div class="dashed"></div>

    <div style="text-align:center;font-size:9px;">
        Sistema POS Restaurante
    </div>

</div>

<script th:inline="javascript">
    const params = new URLSearchParams(window.location.search);
    if (params.get('autoPrint') === 'true') {
        window.onload = () => window.print();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">POS Restaurante</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:       #1d3557;
            --primary-hover: #152740;
            --sidebar-w:     240px;
            --topbar-h:      58px;

            /* Button colors */
            --btn-create:  #344e41;
            --btn-edit:    #023e8a;
            --btn-delete:  #9b2226;

            --surface:     #ffffff;
            --bg:          #f5f7fa;
            --border:      #e2e8f0;
            --text-main:   #1a1a2e;
            --text-sub:    #64748b;
            --radius:      10px;
            --shadow:      0 1px 6px rgba(0,0,0,.08);
            --shadow-md:   0 4px 16px rgba(0,0,0,.10);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            font-size: .92rem;
        }

        /* ══════════════════════════════════
           SIDEBAR
        ══════════════════════════════════ */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid var(--border);
            box-shadow: 2px 0 8px rgba(0,0,0,.06);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;        /* Firefox */
            -ms-overflow-style: none;     /* IE/Edge */
        }

        .sidebar::-webkit-scrollbar {
            display: none;                /* Chrome/Safari */
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-brand img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: contain;
            background: #f1f5f9;
            padding: 3px;
        }

        .sidebar-brand-text h2 {
            font-size: .85rem;
            font-weight: 700;
            color: #121c69;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .sidebar-brand-text span {
            font-size: .7rem;
            color: var(--text-sub);
            font-weight: 400;
        }

        /* Nav sections */
        .nav-section {
            padding: .75rem .75rem 0;
        }

        .nav-section-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #94a3b8;
            padding: .5rem .5rem .35rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .55rem .75rem;
            border-radius: 8px;
            color: #475569;
            text-decoration: none;
            font-size: .85rem;
            font-weight: 500;
            transition: background .18s, color .18s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            opacity: .7;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #121c69;
            color: #ffffff;
        }

        .nav-item:hover svg,
        .nav-item.active svg {
            opacity: 1;
        }

        .nav-item.active {
            background: #121c69;
            color: #ffffff;
            font-weight: 600;
        }
        .sidebar-footer {
            margin-top: auto;
            padding: .75rem;
            border-top: 1px solid var(--border);
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .5rem .6rem;
            border-radius: 8px;
            background: #f1f5f9;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #121c69;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .user-info { flex: 1; overflow: hidden; }
        .user-info span { display: block; font-size: .78rem; color: #1e293b; font-weight: 600;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info small { font-size: .68rem; color: var(--text-sub); }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: .5rem;
            color: #64748b;
            text-decoration: none;
            font-size: .78rem;
            padding: .45rem .6rem;
            border-radius: 8px;
            margin-top: .4rem;
            transition: background .18s, color .18s;
        }

        .logout-btn:hover {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ══════════════════════════════════
           MAIN LAYOUT
        ══════════════════════════════════ */
        .main-wrapper {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            z-index: 50;
            box-shadow: var(--shadow);
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            flex: 1;
        }

        .topbar-user {
            font-size: .82rem;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        /* Page content */
        .page-content {
            padding: 1.5rem;
            flex: 1;
        }

        /* ══════════════════════════════════
           CARDS & TABLES
        ══════════════════════════════════ */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .card-title {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-body { padding: 1.25rem; }

        /* Tables */
        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: .65rem 1rem;
            text-align: left;
            font-size: .76rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-sub);
            border-bottom: 1.5px solid var(--border);
            background: #f8fafc;
            white-space: nowrap;
        }

        tbody td {
            padding: .7rem 1rem;
            font-size: .87rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafbfd; }

        /* Badges */
        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 20px;
            font-size: .72rem;
            font-weight: 600;
        }

        .badge-active   { background: #dcfce7; color: #166534; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }
        .badge-pending  { background: #fef9c3; color: #854d0e; }
        .badge-info     { background: #e0f2fe; color: #0369a1; }

        /* ══════════════════════════════════
           BUTTONS
        ══════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem 1rem;
            font-size: .84rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: filter .18s, transform .1s;
            white-space: nowrap;
        }

        .btn:active { transform: scale(.98); }
        .btn:hover  { filter: brightness(.9); }

        .btn svg { width: 15px; height: 15px; }

        .btn-create { background: var(--btn-create); color: #fff; }
        .btn-edit   { background: var(--btn-edit);   color: #fff; }
        .btn-delete { background: var(--btn-delete);  color: #fff; }
        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-sm { padding: .35rem .7rem; font-size: .78rem; }

        /* ══════════════════════════════════
           FORMS
        ══════════════════════════════════ */
        .form-group { margin-bottom: 1.1rem; }

        .form-label {
            display: block;
            font-size: .81rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: .4rem;
        }

        .form-control,
        .form-select {
            width: 100%;
            padding: .55rem .8rem;
            font-size: .88rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            color: var(--text-main);
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(29,53,87,.08);
        }

        .form-control.is-invalid { border-color: var(--btn-delete); }
        .invalid-feedback { font-size: .78rem; color: var(--btn-delete); margin-top: .25rem; }

        textarea.form-control { resize: vertical; min-height: 80px; }

        /* ══════════════════════════════════
           MODALS
        ══════════════════════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            animation: modalIn .2s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(.96) translateY(-8px); }
            to   { opacity: 1; transform: scale(1)   translateY(0);    }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-title { font-size: .95rem; font-weight: 700; color: var(--text-main); }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-sub);
            padding: 4px;
            border-radius: 6px;
            display: flex;
            transition: background .15s;
        }

        .modal-close:hover { background: #f1f5f9; color: var(--text-main); }

        .modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; }

        .modal-footer {
            padding: .875rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: .6rem;
        }

        /* ══════════════════════════════════
           PAGINATION
        ══════════════════════════════════ */
        .pagination {
            display: flex;
            align-items: center;
            gap: .3rem;
            justify-content: center;
            padding: .75rem 0 .25rem;
            flex-wrap: wrap;
        }

        .page-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            padding: 0 .5rem;
            font-size: .82rem;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-main);
            text-decoration: none;
            transition: background .15s, border-color .15s;
            cursor: pointer;
            background: var(--surface);
        }

        .page-link:hover    { background: var(--primary-lt); border-color: var(--primary); color: var(--primary); }
        .page-link.active   { background: var(--primary); color: #fff; border-color: var(--primary); }
        .page-link.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

        /* ══════════════════════════════════
           ALERTS / TOASTS
        ══════════════════════════════════ */
        .alert-flash {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .84rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .alert-flash.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .alert-flash.error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

        /* ══════════════════════════════════
           PRINT TICKET
        ══════════════════════════════════ */
        @media print {
            .sidebar, .topbar, .no-print { display: none !important; }
            .main-wrapper { margin-left: 0 !important; }
            body { background: #fff; }
            .print-ticket {
                font-family: 'Courier New', monospace;
                font-size: 11px;
                max-width: 300px;
                margin: 0 auto;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

        /* Topbar derecha */
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* User menu button */
        .user-menu-wrapper {
            position: relative;
        }

        .user-menu-btn {
            display: flex;
            align-items: center;
            gap: .5rem;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .35rem .6rem;
            cursor: pointer;
            font-family: inherit;
            transition: background .18s;
        }

        .user-menu-btn:hover { background: #e2e8f0; }

        .user-avatar-sm {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #121c69;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .72rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .user-menu-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .user-menu-info span {
            font-size: .78rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-menu-info small {
            font-size: .65rem;
            color: var(--text-sub);
        }

        /* Dropdown */
        .user-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            z-index: 300;
            padding: .4rem;
            animation: dropIn .15s ease;
        }

        .user-dropdown.open { display: block; }

        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-dropdown-header {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .4rem .5rem .6rem;
        }

        .user-dropdown-header span {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: #1e293b;
        }

        .user-dropdown-header small {
            font-size: .7rem;
            color: var(--text-sub);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .6rem;
            border-radius: 7px;
            font-size: .83rem;
            color: var(--text-main);
            text-decoration: none;
            transition: background .15s;
        }

        .dropdown-item:hover { background: #f1f5f9; }

        .dropdown-logout { color: #991b1b; }
        .dropdown-logout:hover { background: #fee2e2; }
    </style>
</head>
<body>

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img th:if="${empresa != null and empresa.logoUrl != null}"
                 th:src="${empresa.logoUrl}"
                 alt="Logo"
                 onerror="this.style.display='none'">
            <div class="sidebar-brand-text">
                <h2 th:text="${empresa != null ? empresa.nombre : 'POS Restaurante'}">POS Restaurante</h2>
                <span>Sistema de Ventas</span>
            </div>
        </div>

        <nav style="flex:1; padding-bottom:.75rem;">

            <!-- Principal -->
            <div class="nav-section">
                <div class="nav-section-label">Principal</div>

                <a th:href="@{/dashboard}"
                   th:classappend="${currentUri == '/dashboard' ? 'active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Dashboard
                </a>

                <a th:href="@{/pedidos}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/pedidos') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/>
                        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/>
                    </svg>
                    Pedidos
                </a>

                <a th:href="@{/mesas}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/mesas') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M3 12h18M3 18h18"/>
                    </svg>
                    Mesas
                </a>

                <a th:href="@{/cocina}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/cocina') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/>
                        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
                    </svg>
                    Cocina
                </a>
                <a th:href="@{/reservas}"
                    th:classappend="${#strings.startsWith(currentUri ?: '', '/reservas') ? ' active' : ''}"
                    class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                            <circle cx="12" cy="16" r="2"></circle>
                        </svg>
                        Reservas
                </a>
            </div>

            <!-- Catálogo -->
            <div class="nav-section">
                <div class="nav-section-label">Catálogo</div>

                <a th:href="@{/productos}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/productos') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/>
                    </svg>
                    Productos
                </a>
            </div>

            <!-- Administración -->
            <div class="nav-section" sec:authorize="hasRole('ADMIN')">
                <div class="nav-section-label">Administración</div>
                <div class="nav-section" sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/usuarios}"
                        th:classappend="${#strings.startsWith(currentUri ?: '', '/usuarios') ? ' active' : ''}"
                        class="nav-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                            Usuarios
                    </a>

                    <a th:href="@{/empleados}"
                        th:classappend="${#strings.startsWith(currentUri ?: '', '/empleados') ? ' active' : ''}"
                        class="nav-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                            </svg>
                            Empleados
                    </a>
                </div>

                <a th:href="@{/empresa}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/empresa') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07"/>
                    </svg>
                    Empresa
                </a>
            </div>

            <!-- Reportes -->
            <div class="nav-section">
                <div class="nav-section-label">Reportes</div>
                <a th:href="@{/comprobantes}"
                   th:classappend="${#strings.startsWith(currentUri ?: '', '/comprobantes') ? ' active' : ''}"
                   class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                    </svg>
                    Comprobantes
                </a>
                <a th:href="@{/graficas}" 
                    th:classappend="${currentUri == '/graficas' ? 'active' : ''}" 
                    class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        <span>Gráficas</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- ══ MAIN ══ -->
    <div class="main-wrapper">
        <header class="topbar">
            <span class="topbar-title" th:text="${title}">Página</span>
            
            <div class="topbar-right">
                <!-- Botón de usuario con dropdown -->
                <div class="user-menu-wrapper">
                    <button class="user-menu-btn" onclick="toggleUserMenu()">
                        <div class="user-avatar-sm"
                            th:text="${#strings.substring(usuario.nombreCompleto, 0, 1)}">U</div>
                        <div class="user-menu-info">
                            <span th:text="${usuario.nombreCompleto}">Usuario</span>
                            <small th:text="${usuario.rolNombre}">ROL</small>
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>

                    <!-- Dropdown -->
                    <div class="user-dropdown" id="userDropdown">
                        <form th:action="@{/logout}" method="post" style="margin: 0;">
                            <button type="submit" class="dropdown-item dropdown-logout" 
                                    style="width: 100%; border: none; background: none; font-family: inherit; cursor: pointer;">
                
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                    <polyline points="16 17 21 12 16 7"/>
                                    <line x1="21" y1="12" x2="9" y2="12"/>
                                </svg>
                                Cerrar sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <main class="page-content">
            <div th:replace="${content}">Contenido aquí</div>
        </main>
    </div>
<script>
    function toggleUserMenu() {
        document.getElementById('userDropdown').classList.toggle('open');
    }

    // Cierra el dropdown al hacer click fuera
    document.addEventListener('click', function(e) {
        const wrapper = document.querySelector('.user-menu-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            document.getElementById('userDropdown').classList.remove('open');
        }
    });
</script>
</body>
</html>

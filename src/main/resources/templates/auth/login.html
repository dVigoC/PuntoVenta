<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title th:text="${empresa != null ? empresa.nombre + ' — Acceso' : 'Sistema POS — Acceso'}">Sistema POS — Acceso</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:   #1d3557;
            --primary-lt:#e8eef5;
            --surface:   #ffffff;
            --text-main: #1a1a2e;
            --text-sub:  #64748b;
            --border:    #e2e8f0;
            --error:     #9b2226;
            --success:   #344e41;
            --radius:    12px;
            --shadow:    0 4px 24px rgba(29,53,87,.12);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(29,53,87,.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(29,53,87,.05) 0%, transparent 50%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem 2rem;
            border: 1px solid var(--border);
        }

        /* ── Header ── */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            object-fit: contain;
            border: 1px solid var(--border);
            padding: 4px;
            flex-shrink: 0;
        }

        .brand-logo-placeholder {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-logo-placeholder svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .brand-info h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .brand-info p {
            font-size: .78rem;
            color: var(--text-sub);
            margin-top: 2px;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.75rem;
        }

        /* ── Alerts ── */
        .alert {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .84rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: .5rem;
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--error);
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: var(--success);
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: .45rem;
            letter-spacing: .01em;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: .875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            pointer-events: none;
            display: flex;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .7rem .875rem .7rem 2.6rem;
            font-size: .9rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            color: var(--text-main);
            transition: border-color .2s, box-shadow .2s, background .2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(29,53,87,.1);
        }

        input[type="text"].is-invalid,
        input[type="password"].is-invalid {
            border-color: var(--error);
        }

        /* Toggle password visibility */
        .toggle-pw {
            position: absolute;
            right: .875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-sub);
            display: flex;
            padding: 2px;
            transition: color .2s;
        }

        .toggle-pw:hover { color: var(--primary); }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: .8rem 1rem;
            font-size: .95rem;
            font-weight: 600;
            font-family: inherit;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background .2s, transform .1s, box-shadow .2s;
            margin-top: .5rem;
            letter-spacing: .02em;
        }

        .btn-submit:hover {
            background: #152740;
            box-shadow: 0 4px 12px rgba(29,53,87,.3);
        }

        .btn-submit:active { transform: scale(.99); }

        .btn-submit:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .76rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="card">

        <!-- Brand Header -->
        <div class="brand-header">
            <th:block th:if="${empresa != null and empresa.logoUrl != null and !empresa.logoUrl.isEmpty()}">
                <img class="brand-logo"
                     th:src="${empresa.logoUrl}"
                     alt="Logo"
                     onerror="this.style.display='none';document.getElementById('logoPh').style.display='flex'">
                <div id="logoPh" class="brand-logo-placeholder" style="display:none">
                    <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
                </div>
            </th:block>
            <th:block th:if="${empresa == null or empresa.logoUrl == null or empresa.logoUrl.isEmpty()}">
                <div class="brand-logo-placeholder">
                    <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
                </div>
            </th:block>
            <div class="brand-info">
                <h1 th:text="${empresa != null ? empresa.nombre : 'Sistema POS'}">Sistema POS</h1>
                <p>Punto de Venta — Acceso al sistema</p>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Alerts -->
        <div class="alert alert-danger" th:if="${errorMsg}" role="alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" flex-shrink="0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span th:text="${errorMsg}">Error</span>
        </div>

        <div class="alert alert-success" th:if="${logoutMsg}" role="alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            <span th:text="${logoutMsg}">Logout</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" id="loginForm" novalidate autocomplete="off">
            <!-- CSRF Token (Thymeleaf auto-inserts with Spring Security) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Username -->
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Ingrese su usuario"
                           autocomplete="username"
                           maxlength="60"
                           required
                           th:class="${errorMsg != null ? 'is-invalid' : ''}">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Ingrese su contraseña"
                           autocomplete="current-password"
                           maxlength="128"
                           required
                           th:class="${errorMsg != null ? 'is-invalid' : ''}">
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
                        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnLogin">
                Iniciar sesión
            </button>
        </form>
    </div>

    <div class="login-footer">
        <span th:text="${empresa != null ? empresa.desarrollador : 'Sistema POS'}">Sistema POS</span>
    </div>
</div>

<script>
    // Toggle password visibility
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    togglePw.addEventListener('click', () => {
        const isText = pwInput.type === 'text';
        pwInput.type = isText ? 'password' : 'text';
        document.getElementById('eyeIcon').innerHTML = isText
            ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
            : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    // Basic client-side validation
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        if (!user || !pass) {
            e.preventDefault();
            return;
        }
        // Disable button to prevent double submit
        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.textContent = 'Verificando...';
    });

    // Auto-focus username field
    document.getElementById('username').focus();
</script>
</body>
</html>
